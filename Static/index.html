<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chef Matteo · Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0A0A0A;
  --black-2:#111111;
  --black-border:#1E1E1E;
  --white:#FFFFFF;
  --off-white:#F8F7F4;
  --surface:#F2F0EB;
  --surface-2:#EAE7E0;
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --gold-dim:rgba(201,168,76,0.15);
  --gold-border:rgba(201,168,76,0.3);
  --text-primary:#0A0A0A;
  --text-secondary:#5A5750;
  --text-muted:#9A9590;
  --border:#D8D4CC;
  --border-light:#E8E4DC;
}
html{font-family:'DM Sans',system-ui,sans-serif}
body{background:var(--off-white);color:var(--text-primary);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{flex-shrink:0;background:var(--black);border-bottom:1px solid var(--black-border)}
.hdr{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.logo-btn{display:flex;align-items:center;gap:14px;background:none;border:none;cursor:pointer;transition:opacity .15s}
.logo-btn:hover{opacity:.75}
.logo-name{font-family:'Playfair Display',serif;font-weight:700;color:var(--white);font-size:15px;letter-spacing:.01em}
.logo-tag{font-size:9px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;margin-left:8px;opacity:.85}
.tagline{font-size:11px;color:#666;font-style:italic;letter-spacing:.04em}
@media(max-width:640px){.tagline,.logo-tag{display:none}}

/* NAV TABS */
.nav-tabs{display:flex;align-items:center;gap:2px}
.nav-tab{background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#666;padding:6px 14px;border-radius:6px;transition:all .15s}
.nav-tab:hover{color:var(--white);background:rgba(255,255,255,.07)}
.nav-tab.active{color:var(--gold);background:var(--gold-dim)}
.hdr-back-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#aaa;padding:7px 14px;transition:all .15s}
.hdr-back-btn:hover{color:var(--white);border-color:rgba(255,255,255,.35)}

/* BODY */
.body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{flex:1;overflow-y:auto;display:none}
.view.active{display:block}

/* LANDING */
.landing-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:72px 24px 52px;background:var(--off-white)}
.hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.hero-title{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:var(--text-primary);letter-spacing:-.01em;line-height:1.15;margin-bottom:16px}
.hero-desc{font-size:15px;color:var(--text-secondary);max-width:360px;line-height:1.7}

.cards{max-width:680px;margin:0 auto;padding:0 28px 56px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:520px){.cards{grid-template-columns:1fr}}

.card-btn{text-align:left;border-radius:16px;padding:28px;border:1px solid var(--border);cursor:pointer;background:var(--white);font-family:inherit;transition:box-shadow .2s,border-color .2s,transform .15s}
.card-btn:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);border-color:var(--gold-border);transform:translateY(-2px)}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;background:var(--gold-dim);border:1px solid var(--gold-border)}
.card-label{font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;margin-bottom:8px;color:var(--gold)}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:10px;line-height:1.3}
.card-desc{font-size:12px;color:var(--text-secondary);line-height:1.65}
.card-cta{margin-top:18px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--gold);transition:gap .15s}
.card-btn:hover .card-cta{gap:10px}

.how-strip{border-top:1px solid var(--border-light);background:var(--surface);padding:44px 24px 80px}
.how-label{text-align:center;font-size:9px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--text-muted);margin-bottom:36px}
.how-steps{max-width:620px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center}
@media(max-width:540px){.how-steps{grid-template-columns:repeat(2,1fr)}}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--black);color:var(--gold);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:1px solid var(--gold-border)}
.step-title{font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:5px}
.step-desc{font-size:11px;color:var(--text-secondary);line-height:1.5}

/* USE CASE PAGE */
.uc-page{padding:44px 28px;background:var(--off-white)}
.uc-inner{max-width:620px;margin:0 auto}
.uc-header{border-radius:16px;border:1px solid var(--border-light);padding:32px;margin-bottom:24px;background:var(--white);display:flex;gap:18px}
.uc-header-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;background:var(--gold-dim);border:1px solid var(--gold-border)}
.uc-mode-label{font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;margin-bottom:6px;color:var(--gold)}
.uc-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.uc-subtitle{font-size:13px;color:var(--text-secondary);line-height:1.65}

.input-box{border-radius:16px;border:1px solid var(--border);background:var(--white);padding:32px;margin-bottom:16px}
.input-hint{font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--gold);margin-bottom:12px;text-transform:uppercase}
textarea{width:100%;min-height:140px;resize:vertical;font-family:inherit;font-size:14px;background:var(--off-white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text-primary);line-height:1.6;outline:none;transition:border-color .15s,box-shadow .15s}
textarea::placeholder{color:var(--text-muted)}
textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}

.gen-btn{width:100%;height:46px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--black);background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,opacity .15s;margin-top:16px}
.gen-btn:hover{background:var(--gold-light)}
.gen-btn:disabled{opacity:.45;cursor:not-allowed}
.cmd-hint{font-size:10px;color:var(--text-muted);text-align:center;margin-top:8px}
.error-msg{font-size:12px;color:#C0392B;display:flex;align-items:center;gap:6px;margin-top:8px}

.switch-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text-muted);margin:0 auto;padding:8px 0;transition:color .15s}
.switch-btn:hover{color:var(--text-primary)}

/* ACCORDION */
.accord-wrap{border-radius:14px;border:1px solid var(--border-light);overflow:hidden;margin-top:24px;background:var(--white)}
.accord-item{border-top:1px solid var(--border-light)}
.accord-item:first-child{border-top:none}
.accord-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:none;border:none;cursor:pointer;font-family:inherit;transition:background .12s}
.accord-trigger:hover{background:var(--off-white)}
.accord-left{display:flex;align-items:center;gap:8px}
.accord-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.accord-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-secondary)}
.accord-chevron{transition:transform .2s;color:var(--text-muted)}
.accord-chevron.open{transform:rotate(180deg)}
.accord-body{padding:4px 24px 20px}

/* RECIPE PAGE */
.recipe-page{padding:44px 28px;background:var(--off-white)}
.recipe-inner{max-width:740px;margin:0 auto}
.recipe-header{padding-bottom:28px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:36px}
.recipe-by{font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.recipe-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text-primary);letter-spacing:-.01em;line-height:1.2}
.recipe-desc{font-size:14px;color:var(--text-secondary);margin-top:10px;line-height:1.65;font-style:italic}
.recipe-meta{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px}
.meta-item{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.diff-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.06em;text-transform:uppercase}
.diff-easy{background:#E8F5E9;color:#2E7D32}
.diff-medium{background:#FFF8E1;color:#F57F17}
.diff-hard{background:#FFEBEE;color:#C62828}
.back-btn{flex-shrink:0;background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.back-btn:hover{border-color:var(--gold);color:var(--gold)}
.fav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;color:var(--text-secondary)}
.fav-btn:hover,.fav-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
